services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tareas_user
      POSTGRES_PASSWORD: tareas_pass
      POSTGRES_DB: tareas
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tareas_user -d tareas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DB_USER: tareas_user
      DB_PASSWORD: tareas_pass
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: tareas
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
